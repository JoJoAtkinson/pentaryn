# Curated combat-scenario seeds for the testbot.
#
# Each scenario is a SHORT, deterministic playthrough script. The testbot
# picks one per fire (round-robin via `combat-runner/.testbot/run-counter`),
# adapts it to existing NPCs (or imports new ones via the SRD wizard
# programmatically), runs it headlessly through the scenario harness,
# and logs metrics + any bugs.
#
# Format per scenario:
#   id: unique short id
#   title: human label
#   encounter: which combat-runner encounter to spawn (mountin-pass / gar-vally / black-ledger)
#   prelude: text the testbot writes to the log (DM-flavor narration)
#   turns: ordered list of operations
#     - {kind: "type", tab: "<slug>", text: "<sigil or verb>"}
#     - {kind: "click_round"}
#     - {kind: "switch_tab", slug: "<slug>"}
#     - {kind: "assert_hp", slug: "<slug>", expected: <int>}
#     - {kind: "expect_watch", slug: "<observer-slug>", action_name: "<...>"}
#     - {kind: "no_crash"}                  # implicit; verifies nothing exploded
#   targets:
#     max_click_count: 25
#     max_llm_fallback: 0
#     min_turns: 1

scenarios:
  - id: stalker-solo-bloodied
    title: Solo Glacier Stalker — bring to bloodied, verify cure_wounds suggestion fires on Aelric
    encounter: mountin-pass
    prelude: |
      The Stalker emerges from the snow drift. Aelric is 30 ft behind, hands frost-rimed.
    turns:
      - {kind: switch_tab, slug: glacier-stalker}
      - {kind: type, tab: glacier-stalker, text: "-50"}
      - {kind: assert_hp, slug: glacier-stalker, expected: 34}
      - {kind: expect_watch, slug: aelric-frostweaver, action_name: cure_wounds}
    targets:
      max_click_count: 5
      max_llm_fallback: 0

  - id: gnoll-pack-segments
    title: Gnoll pack mob — segments drain right-to-left, then explicit m1 override
    encounter: mountin-pass
    prelude: |
      Three gnolls of the pack close in on the wizard. Fireball is loaded.
    turns:
      - {kind: switch_tab, slug: gnoll-pack}
      - {kind: type, tab: gnoll-pack, text: "-22"}        # kill m3
      - {kind: type, tab: gnoll-pack, text: "-15"}        # m2 to 7
      - {kind: type, tab: gnoll-pack, text: "m1 -22"}     # kill m1
      - {kind: assert_member_hp, slug: gnoll-pack, expected: [0, 7, 0]}
    targets:
      max_click_count: 5

  - id: matron-slots
    title: Matron uses moonbeam — slot decrements, chip greys out
    encounter: gar-vally
    prelude: |
      The matron rises from the fire-pit. Three runners flank her.
    turns:
      - {kind: switch_tab, slug: matron-of-the-valley}
      - {kind: type, tab: matron-of-the-valley, text: "moon"}
      - {kind: assert_slot, slug: matron-of-the-valley, action: moonbeam, remaining: 0}
    targets:
      max_click_count: 5

  - id: condition-duration-tick
    title: Apply paralyzed for 3 rounds; advance 3 rounds; condition auto-removed
    encounter: mountin-pass
    prelude: |
      Aelric burns a 3rd-level slot — Hold Person on the Stalker.
    turns:
      - {kind: switch_tab, slug: glacier-stalker}
      - {kind: type, tab: glacier-stalker, text: "@paralyzed 3"}
      - {kind: assert_condition, slug: glacier-stalker, condition: paralyzed, remaining: 3}
      - {kind: click_round}
      - {kind: click_round}
      - {kind: click_round}
      - {kind: assert_no_condition, slug: glacier-stalker, condition: paralyzed}
    targets:
      max_click_count: 8

  - id: orren-action-surge
    title: Orren burns Action Surge — slot count 0/1, refresh on long_rest only
    encounter: black-ledger
    prelude: |
      Orren steps in for the kill — and for a heartbeat, time doubles.
    turns:
      - {kind: switch_tab, slug: orren}
      - {kind: type, tab: orren, text: "surge"}
      - {kind: assert_slot, slug: orren, action: action_surge, remaining: 0}
    targets:
      max_click_count: 5

  - id: vessa-sneak-attack
    title: Vessa shortsword + sneak — verify extra_damage applies to roller output
    encounter: black-ledger
    prelude: |
      Vessa drifts behind the target. The shortsword tip glints.
    turns:
      - {kind: switch_tab, slug: vessa}
      - {kind: type, tab: vessa, text: "stab"}
    targets:
      max_click_count: 5
      max_llm_fallback: 0

  - id: vessa-uncanny-dodge
    title: Vessa takes damage — Uncanny Dodge reaction surfaces (movement/buff kind)
    encounter: black-ledger
    prelude: |
      An arrow finds Vessa's flank.
    turns:
      - {kind: switch_tab, slug: vessa}
      - {kind: type, tab: vessa, text: "-10"}
    targets:
      max_click_count: 5

  - id: zorgar-rage-frenzy
    title: Zor'gar enters rage, then frenzy — slot decrement + greataxe combo
    encounter: black-ledger
    prelude: |
      Zor'gar bares his teeth. The greataxe is heavy in his hands.
    turns:
      - {kind: switch_tab, slug: zor-gar}
      - {kind: type, tab: zor-gar, text: "rage"}
      - {kind: assert_slot, slug: zor-gar, action: rage, remaining: 2}
      - {kind: type, tab: zor-gar, text: "axe"}
    targets:
      max_click_count: 5

  - id: maela-hex-eldritch-loop
    title: Maela hexes target, then 2 rounds of Eldritch Blast — hex extra damage shouldn't double-apply
    encounter: black-ledger
    prelude: |
      Maela whispers the hex. Her patron's name buzzes in the target's ear.
    turns:
      - {kind: switch_tab, slug: maela}
      - {kind: type, tab: maela, text: "hex"}
      - {kind: type, tab: maela, text: "blast"}
      - {kind: click_round}
      - {kind: type, tab: maela, text: "blast"}
    targets:
      max_click_count: 6

  - id: ancestor-stir-frightened-cascade
    title: Ancestor-Stir claws → frightened condition → wail recharge cycle
    encounter: gar-vally
    prelude: |
      The matron is dead. The pact is broken. Something OLDER rises.
    turns:
      - {kind: switch_tab, slug: ancestor-stir}
      - {kind: type, tab: ancestor-stir, text: "claws"}
      - {kind: type, tab: ancestor-stir, text: "wail"}
      - {kind: click_round}
    targets:
      max_click_count: 8

  - id: party-of-two-cross-fire
    title: Stalker takes melee damage → rime_reflex trigger surfaces → DM passes
    encounter: mountin-pass
    prelude: |
      The Stalker bites a PC; the PC's barbarian counter-charges.
    turns:
      - {kind: switch_tab, slug: glacier-stalker}
      - {kind: type, tab: glacier-stalker, text: "-15"}
    targets:
      max_click_count: 4
      reaction_prompts_min: 1

  - id: aelric-counterspell-watch
    title: Spell-cast event globally triggers Aelric's counterspell trigger
    encounter: mountin-pass
    prelude: |
      A wandering wizard begins to weave the air. Aelric narrows his eyes.
    turns:
      - {kind: emit_spell_cast, caster: "PC:Lyric", spell: "Fireball", target: glacier-stalker, level: 3}
    targets:
      max_click_count: 0
      reaction_prompts_min: 1

  # ── THRULM SCENARIOS (Compass Edge, level 5, 3 PCs — Bazgar/Marwen/Sabriel) ──

  - id: thrulm-beholder-alpha-strike
    title: Beholder opens with Drain Divinity → multiattack sequence vs Compass Edge
    encounter: thrulm
    prelude: |
      The beholder has been waiting. It knows a divine martial when it senses one —
      Sabriel's faith is a beacon in the void. It strikes before she can act.
      Marwen drifts left. The stone tastes like copper.
    turns:
      - {kind: switch_tab, slug: beholder-thrulm}
      - {kind: type, tab: beholder-thrulm, text: "drain"}
      - {kind: type, tab: beholder-thrulm, text: "multiattack"}
      - {kind: click_round}
      - {kind: type, tab: beholder-thrulm, text: "ray"}
    targets:
      max_click_count: 8
      max_llm_fallback: 0
      notes: |
        Key questions: (1) does drain_divinity surface cleanly as a legendary-cost
        utility?  (2) does multiattack roll all 3 sub-attacks and show grapple riders
        on both tentacles?  (3) does disintegration_ray correctly label recharge=5?
        Party is MEANT to lose — verify beholder threatens Marwen (32 HP) in ≤2 rounds.

  - id: thrulm-thrall-compelled-move
    title: Thrall derro compelled movement — beholder redirects minion mid-combat
    encounter: thrulm
    prelude: |
      The thrall stood where it had been placed, eyes unfocused.
      Then the hunger spoke, and the feet moved.
    turns:
      - {kind: switch_tab, slug: thrall-derro}
      - {kind: type, tab: thrall-derro, text: "hand axe"}
      - {kind: type, tab: thrall-derro, text: "compelled"}
      - {kind: click_round}
    targets:
      max_click_count: 5
      max_llm_fallback: 0
      notes: |
        Verifies (1) hand_axe_weak renders correctly with +1 to-hit / 1d4 damage
        (intentionally weak — dominated creature).  (2) compelled_movement shows
        as bonus-action effect, not an attack roll.

  - id: thrulm-shrine-touched-retaliation
    title: Shrine-touched takes 12 damage — Unstable Form + Oath-Breaking Retaliation
    encounter: thrulm
    prelude: |
      The shrine-touched derro staggers from the blow. The runes on its arms
      flare brighter. Something in its face shifts — not anger. Hunger.
    turns:
      - {kind: switch_tab, slug: shrine-touched-derro}
      - {kind: type, tab: shrine-touched-derro, text: "-12"}
      - {kind: expect_watch, slug: shrine-touched-derro, action_name: oath_breaking_retaliation}
      - {kind: type, tab: shrine-touched-derro, text: "resonance"}
    targets:
      max_click_count: 6
      reaction_prompts_min: 1
      notes: |
        Verifies (1) oath_breaking_retaliation reaction fires on damage event.
        (2) ancient_resonance rolls correctly as 2d10 necrotic DC14 DEX save.
        Feel note: Unstable Form (+advantage on attacks after 10+ damage) has no
        DB representation — DM must apply manually. Log as automation gap.

  - id: thrulm-oath-breaking-dual-damage
    title: Shrine-touched killed by lethal hit — Oath-Breaking Retaliation fires on death blow, dual damage type verified
    encounter: thrulm
    prelude: |
      Sabriel's radiant smite found the shrine-touched mid-swing. 29 damage.
      The creature was already dead when the runes flared — but the oath-echo
      fired anyway, and the axe still landed.
    turns:
      - {kind: switch_tab, slug: shrine-touched-derro}
      - {kind: type, tab: shrine-touched-derro, text: "-28"}
      - {kind: assert_hp, slug: shrine-touched-derro, expected: 17}
      - {kind: type, tab: shrine-touched-derro, text: "-29"}
      - {kind: expect_watch, slug: shrine-touched-derro, action_name: oath_breaking_retaliation}
    targets:
      max_click_count: 6
      reaction_prompts_min: 1
      notes: |
        Tests DB-BUG-R156-01: oath_breaking_retaliation reaction must roll BOTH
        1d8+1 slashing AND 1d8 necrotic in a single output. Currently the DB row
        has no embedded damage dice — the runner will narrate without rolling.
        This scenario should FAIL (reaction prompt fires but no dice output) until
        the DB row is updated via combat_action_upsert with an embedded shrine-axe
        single_attack spec. Unstable Form advantage should also surface (shrine-touched
        took 28+29=57 damage this "turn" in the test — well above 10-damage threshold).
        Regression gate: once fixed, confirm both damage types appear in narration.

  - id: thrulm-rager-berserk-gate
    title: Rager uses Berserk — type "utility" rolls no dice; regression gate for BUG-RAGER-BERSERK-TYPE
    encounter: thrulm
    prelude: |
      The rager has been hit twice. It stops moving and becomes pure geometry —
      the greataxe describes a full circle and the world gets smaller.
    turns:
      - {kind: switch_tab, slug: derro-rager}
      - {kind: type, tab: derro-rager, text: "berserk"}
    targets:
      max_click_count: 4
      max_llm_fallback: 0
      notes: |
        Regression gate for BUG-RAGER-BERSERK-TYPE (HIGH, 15+ fires).
        `berserk` is currently type "utility" with no attacks array — the runner
        will narrate without rolling any dice. This scenario SHOULD FAIL (narration
        fires but no 1d12 dice output) until `berserk` is re-authored via
        combat_action_upsert as type "area" or given an embedded attacks spec.
        Pass condition: roller output contains a 1d12 roll (at least one greataxe
        attack against each creature in reach). Recharge 5–6 label should also
        appear once the type is corrected.

  - id: thrulm-beholder-tentacle-grapple
    title: Beholder multiattack → Marwen grappled → Maw advantage verified → Antireality on counter
    encounter: thrulm
    prelude: |
      The shrine chamber is silent save for the copper taste of the air. The Hunger
      drifts from the altar — tentacles trailing. Marwen is nearest. Bazgar raises his
      shield. The stone beneath the beholder ripples as if underwater.
    turns:
      - {kind: switch_tab, slug: beholder-thrulm}
      - {kind: type, tab: beholder-thrulm, text: "multi"}
      - {kind: type, tab: beholder-thrulm, text: "lash"}
      - {kind: type, tab: beholder-thrulm, text: "-15"}
      - {kind: assert_hp, slug: beholder-thrulm, expected: 95}
    targets:
      max_click_count: 10
      max_llm_fallback: 0
      notes: |
        Tests: (1) multiattack rolls all 3 sub-attacks with grapple riders on both
        tentacles. (2) 'lash' verb resolves to tentacle_legendary (not multiattack).
        (3) Antireality prompt fires on incoming attack (action_executed event after
        BUG-F7-02 fix R224) — verify prompt appears BEFORE damage is resolved.
        Regression gate for BUG-F7-02: if prompt still fires on damage event, this
        cycle didn't fully take.

  - id: thrulm-disintegration-recharge
    title: Disintegration Ray fires → recharge label surfaces → round advance ticks recharge
    encounter: thrulm
    prelude: |
      Marwen is down. The beholder angles toward Bazgar — the void within it hungry
      for something durable to unmake.
    turns:
      - {kind: switch_tab, slug: beholder-thrulm}
      - {kind: type, tab: beholder-thrulm, text: "disintegrate"}
      - {kind: click_round}
    targets:
      max_click_count: 8
      notes: |
        Tests: (1) disintegration_ray surfaces recharge=5 label in output.
        (2) Permanent-death rider text appears in narration ("cannot be restored
        except by true resurrection or wish"). (3) After click_round, DM sees
        the recharge roll prompt. Design flag: FEEL-003 — permanent death on
        a "meant to lose" fight; Joe may want a soft-kill variant for Compass Edge.

  - id: thrulm-void-scream-aoe
    title: Void Scream (recharge 6) — psychic AoE with shrine-proximity penalty and frightened rider
    encounter: thrulm
    prelude: |
      All three PCs converge. The beholder rises above the altar, tentacles spread wide.
      A pressure builds behind the eyes. Then it screams without a mouth.
    turns:
      - {kind: switch_tab, slug: beholder-thrulm}
      - {kind: type, tab: beholder-thrulm, text: "scream"}
    targets:
      max_click_count: 5
      notes: |
        Tests: (1) void_scream surfaces recharge=6 and the 30-ft-radius area tag.
        (2) Frightened rider text appears (FIX-FC46-A). (3) "Creatures within 10 ft
        of shrine have disadvantage" reminder surfaces (FIX-FC48-A). DC 16 Wis save,
        6d10 psychic, half on success. Unconscious PCs excluded per FIX-FC48-A ruling.
