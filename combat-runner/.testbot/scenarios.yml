  - id: thrulm-shardcaller-barrage-line
    title: Shardcaller fires Shard-Barrage (line area, DC 13 Dex)
    encounter: thrulm
    prelude: |
      Two PCs line up. The shardcaller smiles.
    turns:
      - {kind: switch_tab, slug: derro-shardcaller}
      - {kind: type, tab: derro-shardcaller, text: "barrage"}
    targets:
      max_click_count: 5

  - id: thrulm-deep-watch-formation
    title: Deep Watch derro — multiattack opener, then crossbow on the wizard
    encounter: thrulm
    prelude: |
      Two Deep Watch derro hold the chamber mouth. The wizard is twenty feet back.
    turns:
      - {kind: switch_tab, slug: deep-watch-derro}
      - {kind: type, tab: deep-watch-derro, text: "attack"}
